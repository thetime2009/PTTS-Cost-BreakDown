<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="hr.js?v=4.6"></script>
<script>
// ────────────────────────────────────────────────────────────
// EMPLOYEE PORTAL — employee.html v1.5
// ────────────────────────────────────────────────────────────

var _empSlipPeriod = 'all';
var _empCurTab = 'loan';
var EMP_SESSION_LS = 'ptts_emp_session';

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  // ตั้งค่า month default = เดือนปัจจุบัน
  var now = new Date();
  var yyyymm = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  var slipMonEl = document.getElementById('empSlipMonth');
  if (slipMonEl) slipMonEl.value = yyyymm;

  // ตรวจว่าตั้ง Script URL ไว้หรือยัง
  var url = localStorage.getItem('ptts_script_url') || '';
  if (!url) {
    document.getElementById('empUrlNote').style.display = '';
  }

  // ── ตรวจ session ที่จำไว้ ──
  try {
    var saved = JSON.parse(localStorage.getItem(EMP_SESSION_LS) || 'null');
    if (saved && saved.session && saved.expiry && Date.now() < saved.expiry) {
      _hrSession = saved.session;
      empShowApp();
      return; // ข้ามหน้า login
    } else if (saved) {
      localStorage.removeItem(EMP_SESSION_LS); // expired → ล้าง
    }
  } catch(e) {}

  _empCheckOnline();
});

function _empCheckOnline() {
  var url = localStorage.getItem('ptts_script_url') || '';
  if (!url) return;
  var chip = document.getElementById('empConnChip');
  fetch(url + '?action=ping', { method: 'GET' })
    .then(function(r) { return r.json(); })
    .then(function() {
      if (chip) {
        chip.style.display = '';
        chip.textContent = '✓ Online';
        chip.style.cssText = 'font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:999px;background:#4ade80;border:1px solid #16a34a;color:#052e16;letter-spacing:.3px';
      }
    })
    .catch(function() {});
}

// ── SAVE SCRIPT URL ──────────────────────────────────────────
function empSaveUrl() {
  var v = (document.getElementById('empUrlInput') || {}).value || '';
  if (!v.trim()) return;
  localStorage.setItem('ptts_script_url', v.trim());
  document.getElementById('empUrlNote').style.display = 'none';
  Swal.fire({ icon: 'success', title: 'บันทึก URL แล้ว', timer: 1200, showConfirmButton: false });
}

// ── LOGIN ─────────────────────────────────────────────────────
function empDoLogin() {
  var empId = ((document.getElementById('empLoginId') || {}).value || '').trim();
  var pin   = ((document.getElementById('empLoginPin') || {}).value || '').trim();
  var errEl  = document.getElementById('empLoginErr');

  if (!empId || !pin) {
    errEl.textContent = 'กรุณากรอกรหัสพนักงานและ PIN';
    return;
  }

  // ตรวจ Master PIN ก่อน
  var masterPin = localStorage.getItem('ptts_hr_master_pin') || '';
  if (masterPin && pin === masterPin) {
    _hrSession = { empId: empId, name: 'ผู้จัดการ (admin)', dept: '', role: 'manager', advanceBudget: 0 };
    _empSaveSession();
    empShowApp();
    return;
  }

  // ตรวจ PIN พนักงานผ่าน Code.gs
  var url = localStorage.getItem('ptts_script_url') || '';
  if (!url) {
    errEl.textContent = '⚠️ ยังไม่ได้ตั้งค่า Script URL — กรุณาใส่ด้านบน';
    document.getElementById('empUrlNote').style.display = '';
    return;
  }

  errEl.textContent = '⏳ กำลังตรวจสอบ...';
  _hrPOST('hrLogin', { phone: empId, pin: pin }).then(function(r) {
    if (r.status === 'ok') {
      _hrSession = Object.assign({}, r.emp, { role: 'emp' });
      _empSaveSession();
      empShowApp();
    } else {
      errEl.textContent = r.message || 'PIN ไม่ถูกต้อง';
    }
  }).catch(function(e) {
    errEl.textContent = 'เชื่อมต่อไม่ได้: ' + (e.message || String(e));
  });
}

function _empSaveSession() {
  var remember = (document.getElementById('empRemember') || {}).checked !== false;
  if (!remember || !_hrSession) return;
  var expiry = Date.now() + 30 * 24 * 60 * 60 * 1000; // 30 วัน
  try { localStorage.setItem(EMP_SESSION_LS, JSON.stringify({ session: _hrSession, expiry: expiry })); } catch(e) {}
}

function empTogglePin() {
  var inp = document.getElementById('empLoginPin');
  var eye = document.querySelector('.emp-pin-eye');
  if (!inp) return;
  if (inp.type === 'password') {
    inp.type = 'text';
    if (eye) eye.textContent = '🙈';
  } else {
    inp.type = 'password';
    if (eye) eye.textContent = '👁';
  }
}

function empShowApp() {
  document.getElementById('empLoginOverlay').style.display = 'none';
  document.getElementById('empApp').style.display = '';

  // แสดงชื่อพนักงาน
  var nameEl = document.getElementById('empSessionName');
  if (nameEl && _hrSession) {
    nameEl.textContent = (_hrSession.name || _hrSession.empId) +
      (_hrSession.dept ? ' · ' + _hrSession.dept : '') +
      (_hrSession.role === 'manager' ? ' 👔' : '');
  }

  empTabSwitch('slip');
  _empCheckOnline();
}

// ── LOGOUT ────────────────────────────────────────────────────
function empLogout() {
  _hrSession = null;
  localStorage.removeItem(EMP_SESSION_LS); // ล้าง session ที่จำไว้
  document.getElementById('empApp').style.display = 'none';
  document.getElementById('empLoginOverlay').style.display = '';
  var idEl  = document.getElementById('empLoginId');
  var pinEl = document.getElementById('empLoginPin');
  var errEl = document.getElementById('empLoginErr');
  if (idEl)  idEl.value  = '';
  if (pinEl) { pinEl.value = ''; pinEl.type = 'password'; }
  var eye = document.querySelector('.emp-pin-eye');
  if (eye) eye.textContent = '👁';
  if (errEl) errEl.textContent = '';
}

// Override hrLogout (defined in hr.js) — ใน employee.html ให้ออกจากระบบทั้งหน้า
function hrLogout() {
  empLogout();
}

// ── TAB SWITCHING ─────────────────────────────────────────────
function empTabSwitch(tab) {
  _empCurTab = tab;

  var tabs = ['loan', 'slip', 'cal', 'summary'];
  var panMap = {
    loan:    'hrPanel6',
    slip:    'empPanelSlip',
    cal:     'hrPanel5',
    summary: 'empPanelSummary'
  };

  // อัป chip buttons (top)
  tabs.forEach(function(t) {
    var btn = document.getElementById('empTabBtn-' + t);
    if (btn) {
      btn.classList.toggle('active', t === tab);
    }
  });

  // อัป bottom tab buttons (mobile)
  tabs.forEach(function(t) {
    var btn = document.getElementById('empBotBtn-' + t);
    if (btn) {
      btn.classList.toggle('active', t === tab);
    }
  });

  // แสดง/ซ่อน panels
  tabs.forEach(function(t) {
    var el = document.getElementById(panMap[t]);
    if (el) el.style.display = t === tab ? '' : 'none';
  });

  // เรียก render function
  if (tab === 'loan')    _hrRenderLoans();
  if (tab === 'cal')     _hrRenderCal();
  if (tab === 'summary') _empRenderAttSummary();
  if (tab === 'slip')    _empRenderSlip();
}

// ── SLIP PANEL ─────────────────────────────────────────────────
function _empRenderSlip() {
  var now = new Date();
  var slipMonEl = document.getElementById('empSlipMonth');
  if (slipMonEl && !slipMonEl.value)
    slipMonEl.value = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

  // Auto-select งวดตามวันที่ปัจจุบัน
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  if (pc.mode === 'semi') {
    var d = now.getDate();
    var autoPeriod = (d >= pc.p1.start && d <= pc.p1.end) ? 'p1' : 'p2';
    _empSlipPeriod = autoPeriod;
    document.querySelectorAll('.emp-period-btn').forEach(function(b) {
      b.classList.toggle('sel', b.getAttribute('data-val') === autoPeriod);
    });
  }

  _empLoadSlipPreview();
}

function empPeriodSel(btn) {
  _empSlipPeriod = btn.getAttribute('data-val') || 'all';
  document.querySelectorAll('.emp-period-btn').forEach(function(b) {
    b.classList.toggle('sel', b === btn);
  });
  _empLoadSlipPreview();
}

function empViewSlip() {
  if (!_hrSession) return;
  var mon = (document.getElementById('empSlipMonth') || {}).value || '';
  if (!mon) return;
  hrOpenPayslip(_hrSession.empId, mon, _empSlipPeriod);
}

function _empLoadSlipPreview() {
  var preview = document.getElementById('empSlipPreview');
  if (!preview || !_hrSession) return;
  var mon = (document.getElementById('empSlipMonth') || {}).value || '';
  if (!mon) return;

  preview.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t3);font-size:.85rem">⏳ กำลังโหลด...</div>';

  // สำหรับงวด 2 ต้องโหลดเดือนก่อนด้วย
  var months = [mon];
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  if (_empSlipPeriod === 'p2' && pc.mode === 'semi') {
    var mp = mon.split('-').map(Number);
    var pM = mp[1] === 1 ? 12 : mp[1] - 1;
    var pY = mp[1] === 1 ? mp[0] - 1 : mp[0];
    months.push(pY + '-' + String(pM).padStart(2, '0'));
  }

  var empId = String(_hrSession.empId);
  Promise.all([
    Promise.all(months.map(function(m) { return _hrGET('getHRAttendance', { month: m }); })),
    (_hrEmps && _hrEmps.length) ? Promise.resolve({ data: _hrEmps }) : _hrGET('getHREmployees')
  ]).then(function(results) {
    var allAtt = results[0].reduce(function(a, r) { return a.concat(r.data || []); }, []);
    if (results[1] && results[1].data) _hrEmps = results[1].data;
    var att = allAtt.filter(function(r) { return String(r.empId) === empId; });
    att = (typeof _hrFilterByPeriod === 'function') ? _hrFilterByPeriod(att, _empSlipPeriod, mon) : att;
    var empRec = (_hrEmps || []).find(function(e) { return String(e.empId) === empId; }) || null;
    var ps = (typeof _hrCalcPayslip === 'function') ? _hrCalcPayslip(empRec, att, mon, _empSlipPeriod) : null;
    if (!ps) { preview.innerHTML = '<div style="color:#f87171;padding:12px">ไม่สามารถคำนวณได้</div>'; return; }
    if (!att.length) {
      preview.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t3);font-size:.85rem">ไม่พบข้อมูลเวลางานเดือนนี้<br><span style="font-size:.78rem">กรุณาติดต่อ HR</span></div>';
      return;
    }
    preview.innerHTML = _empSlipPreviewHtml(ps, mon);
  }).catch(function(e) {
    preview.innerHTML = '<div style="color:#f87171;padding:12px;font-size:.82rem">❌ ' + (e.message || String(e)) + '</div>';
  });
}

function _empSlipPreviewHtml(ps, mon) {
  var _slipCo = {}; try { _slipCo = JSON.parse(localStorage.getItem('ptts_company_cfg') || '{}'); } catch(e) {}
  var company = _slipCo.name || localStorage.getItem('ptts_company_name') || 'PTTS SMART FACTORY';
  var fmt = (typeof _hrFmt === 'function') ? _hrFmt : function(v) { return parseFloat(v).toLocaleString('th-TH', {minimumFractionDigits:2}); };
  var payRow = function(label, val, bold) {
    var neg = val < 0;
    return '<tr><td style="padding:4px 0;font-size:.83rem;color:' + (bold ? '#1e293b' : '#64748b') + ';' + (bold ? 'font-weight:700;border-top:1px solid #e2e8f0;padding-top:7px' : '') + '">' + label + '</td>' +
      '<td style="padding:4px 0;font-size:.83rem;text-align:right;color:' + (neg ? '#dc2626' : bold ? '#1e293b' : '#374151') + ';' + (bold ? 'font-weight:700;border-top:1px solid #e2e8f0;padding-top:7px' : '') + '">' +
      (neg ? '−' : '') + '฿' + fmt(Math.abs(val)) + '</td></tr>';
  };
  var statCol = function(val, label, color) {
    return '<div style="text-align:center;flex:1">' +
      '<div style="font-size:1rem;font-weight:800;color:' + color + '">' + val + '</div>' +
      '<div style="font-size:.62rem;color:#94a3b8;margin-top:1px">' + label + '</div></div>';
  };

  var earRows = '';
  var baseLabel = ps.type === 'daily' ? 'ค่าแรง (' + ps.present + ' วัน × ฿' + fmt(ps.dailyRate) + ')' : 'เงินเดือน';
  earRows += payRow(baseLabel, ps.basePay, false);
  if (ps.otPayWD  > 0) earRows += payRow('OT ปกติ ('  + ps.otWDH  + ' ชม.)', ps.otPayWD,  false);
  if (ps.otPaySun > 0) earRows += payRow('OT อาทิตย์ (' + ps.otSunH + ' ชม.)', ps.otPaySun, false);
  earRows += payRow('รวมรายได้', ps.gross, true);
  if (ps.absentDeduct > 0) earRows += payRow('ขาดงาน ' + ps.absent + ' วัน', -ps.absentDeduct, false);

  var periodLabel = ps.periodLabel || ('ประจำเดือน ' + (ps.monthLabel || mon));

  return '<div style="background:var(--bg-card);border:1px solid var(--bc-card);border-radius:16px;overflow:hidden">' +
    '<div style="background:linear-gradient(135deg,#1e40af,#3b82f6);padding:16px 18px;text-align:center;color:#fff">' +
      '<div style="font-size:.68rem;opacity:.8;letter-spacing:1px;text-transform:uppercase">' + company + '</div>' +
      '<div style="font-size:1.1rem;font-weight:800;margin:4px 0 2px">สลิปเงินเดือน</div>' +
      '<div style="font-size:.82rem;opacity:.9">' + periodLabel + '</div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0">' +
      '<div><div style="font-size:.65rem;color:#94a3b8">ชื่อ-สกุล</div><div style="font-size:.85rem;font-weight:700;color:#1e293b">' + ps.name + '</div></div>' +
      '<div><div style="font-size:.65rem;color:#94a3b8">แผนก</div><div style="font-size:.85rem;font-weight:600;color:#1e293b">' + (ps.dept || '—') + '</div></div>' +
    '</div>' +
    '<div style="display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid #f1f5f9">' +
      statCol(ps.present,          'มา',        '#059669') +
      statCol(ps.absent,           'ขาด',       ps.absent  > 0 ? '#dc2626' : '#cbd5e1') +
      statCol(ps.lateTimes,        'สายครั้ง',  ps.lateTimes > 0 ? '#d97706' : '#cbd5e1') +
      statCol(ps.otWDH.toFixed(1), 'OT ปกติ',  '#4338ca') +
      statCol(ps.otSunH.toFixed(1),'OT อา.',    '#b45309') +
    '</div>' +
    '<div style="padding:10px 16px 6px">' +
      '<table style="width:100%;border-collapse:collapse">' + earRows + '</table>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#059669,#10b981);border-radius:10px;padding:10px 14px;margin-top:8px">' +
        '<span style="color:#fff;font-weight:700;font-size:.88rem">💰 รับสุทธิ</span>' +
        '<span style="color:#fff;font-weight:800;font-size:1.15rem">฿' + fmt(ps.net) + '</span>' +
      '</div>' +
    '</div>' +
    '<div style="padding:10px 12px">' +
      '<button onclick="empViewSlip()" style="width:100%;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-family:Sarabun,sans-serif;font-size:.88rem;font-weight:700;cursor:pointer">🖨️ พิมพ์สลิป / บันทึก</button>' +
    '</div>' +
  '</div>';
}
// ── ATTENDANCE SUMMARY (read-only) ───────────────────────────
var _empAttMon = '';
var _empAttPeriod = 'all';

function _empRenderAttSummary() {
  var p = document.getElementById('empPanelSummary');
  if (!p) return;
  var now = new Date();
  if (!_empAttMon) _empAttMon = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

  // Auto-select period
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  if (pc.mode === 'semi' && _empAttPeriod === 'all') {
    _empAttPeriod = (now.getDate() >= pc.p1.start && now.getDate() <= pc.p1.end) ? 'p1' : 'p2';
  }

  p.innerHTML = _empAttHeaderHtml() + '<div id="empAttTable"><div style="padding:20px;text-align:center;color:var(--t3);font-size:.85rem">⏳ กำลังโหลด...</div></div>';
  _empLoadAttTable();
}

function _empAttHeaderHtml() {
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  var periodBtns = pc.mode === 'semi'
    ? '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">' +
        _empAttPeriodBtn('all','ทั้งเดือน') +
        _empAttPeriodBtn('p1','งวด 1 ('+pc.p1.start+'-'+pc.p1.end+')') +
        _empAttPeriodBtn('p2','งวด 2 ('+pc.p2.start+'-'+pc.p2.end+')') +
      '</div>'
    : '';
  return '<div style="margin-bottom:12px">' +
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
      '<button onclick="_empAttPrev()" style="padding:5px 12px;border-radius:8px;border:1px solid var(--bc-input);background:transparent;color:var(--t2);cursor:pointer;font-size:.9rem">◀</button>' +
      '<div style="font-weight:700;font-size:.95rem;color:var(--c1);min-width:110px;text-align:center" id="empAttMonLabel">' + (typeof _hrMLab === 'function' ? _hrMLab(_empAttMon) : _empAttMon) + '</div>' +
      '<button onclick="_empAttNext()" style="padding:5px 12px;border-radius:8px;border:1px solid var(--bc-input);background:transparent;color:var(--t2);cursor:pointer;font-size:.9rem">▶</button>' +
    '</div>' + periodBtns +
  '</div>';
}

function _empAttPeriodBtn(val, label) {
  var sel = _empAttPeriod === val;
  return '<button onclick="_empAttSetPeriod(\'' + val + '\')" style="padding:6px 14px;border-radius:9px;border:1px solid ' + (sel ? 'var(--c1)' : 'var(--bc-input)') + ';background:' + (sel ? 'var(--c1)' : 'transparent') + ';color:' + (sel ? '#fff' : 'var(--t3)') + ';font-family:Sarabun,sans-serif;font-size:.8rem;cursor:pointer">' + label + '</button>';
}

function _empAttSetPeriod(val) {
  _empAttPeriod = val;
  var p = document.getElementById('empPanelSummary');
  if (p) { p.innerHTML = _empAttHeaderHtml() + '<div id="empAttTable"><div style="padding:20px;text-align:center;color:var(--t3);font-size:.85rem">⏳ กำลังโหลด...</div></div>'; }
  _empLoadAttTable();
}

function _empAttPrev() {
  var mp = _empAttMon.split('-').map(Number);
  var m = mp[1] - 1; var y = mp[0];
  if (m < 1) { m = 12; y--; }
  _empAttMon = y + '-' + String(m).padStart(2,'0');
  _empRenderAttSummary();
}

function _empAttNext() {
  var mp = _empAttMon.split('-').map(Number);
  var m = mp[1] + 1; var y = mp[0];
  if (m > 12) { m = 1; y++; }
  _empAttMon = y + '-' + String(m).padStart(2,'0');
  _empRenderAttSummary();
}

function _empLoadAttTable() {
  if (!_hrSession) return;
  var empId = String(_hrSession.empId);
  var months = [_empAttMon];
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  if (_empAttPeriod === 'p2' && pc.mode === 'semi') {
    var mp = _empAttMon.split('-').map(Number);
    var pM = mp[1] === 1 ? 12 : mp[1] - 1;
    var pY = mp[1] === 1 ? mp[0] - 1 : mp[0];
    months.push(pY + '-' + String(pM).padStart(2,'0'));
  }
  Promise.all(months.map(function(m) { return _hrGET('getHRAttendance', { month: m }); }))
    .then(function(results) {
      var allRows = results.reduce(function(a, r) { return a.concat(r.data || []); }, []);
      var rows = allRows.filter(function(r) { return String(r.empId) === empId; });
      rows = (typeof _hrFilterByPeriod === 'function') ? _hrFilterByPeriod(rows, _empAttPeriod, _empAttMon) : rows;
      // Sort by date
      rows.sort(function(a, b) {
        var pa = String(a.date||'').split('/'), pb = String(b.date||'').split('/');
        var da = new Date(parseInt(pa[2]) - (parseInt(pa[2])>2500?543:0), parseInt(pa[1])-1, parseInt(pa[0]));
        var db = new Date(parseInt(pb[2]) - (parseInt(pb[2])>2500?543:0), parseInt(pb[1])-1, parseInt(pb[0]));
        return da - db;
      });
      var tbl = document.getElementById('empAttTable');
      if (tbl) tbl.innerHTML = _empAttTableHtml(rows);
    }).catch(function(e) {
      var tbl = document.getElementById('empAttTable');
      if (tbl) tbl.innerHTML = '<div style="color:#f87171;font-size:.82rem">❌ ' + (e.message || String(e)) + '</div>';
    });
}

function _empAttTableHtml(rows) {
  if (!rows.length) return '<div style="padding:24px;text-align:center;color:var(--t3);font-size:.85rem">ไม่พบข้อมูลเดือนนี้<br><span style="font-size:.78rem">กรุณาติดต่อ HR หากมีข้อสงสัย</span></div>';

  // Summary stats
  var present = 0, absent = 0, late = 0, lateMin = 0, otH = 0;
  rows.forEach(function(r) {
    if (r.status === 'present') present++;
    else if (r.status === 'absent') absent++;
    if ((parseInt(r.lateMin)||0) > 0) { late++; lateMin += parseInt(r.lateMin)||0; }
    otH += parseFloat(r.otHours)||0;
  });

  var statBox = function(val, label, color) {
    return '<div style="text-align:center;flex:1;padding:8px 4px;background:var(--bg-card);border:1px solid var(--bc-card);border-radius:10px">' +
      '<div style="font-size:1.1rem;font-weight:800;color:' + color + '">' + val + '</div>' +
      '<div style="font-size:.65rem;color:var(--t3);margin-top:2px">' + label + '</div>' +
    '</div>';
  };

  var statusLabel = function(s) {
    if (s === 'present') return '<span style="color:#059669;font-size:.75rem;font-weight:600">✓ มา</span>';
    if (s === 'absent')  return '<span style="color:#dc2626;font-size:.75rem;font-weight:600">✗ ขาด</span>';
    return '<span style="color:#94a3b8;font-size:.75rem">วันหยุด</span>';
  };

  var dayRows = rows.map(function(r) {
    var late_m = parseInt(r.lateMin) || 0;
    var ot_h   = parseFloat(r.otHours) || 0;
    return '<tr style="border-bottom:1px solid var(--bc-input)">' +
      '<td style="padding:7px 8px;font-size:.8rem;color:var(--t2);white-space:nowrap">' + (r.date||'—') + '</td>' +
      '<td style="padding:7px 4px;font-size:.82rem;font-weight:600;color:var(--t1)">' + (r.clockIn||'—') + '</td>' +
      '<td style="padding:7px 4px;font-size:.82rem;color:var(--t2)">' + (r.lastScan||r.clockOut||'—') + '</td>' +
      '<td style="padding:7px 4px">' + statusLabel(r.status) + '</td>' +
      '<td style="padding:7px 4px;font-size:.78rem;color:' + (late_m > 0 ? '#d97706' : 'var(--t4)') + '">' + (late_m > 0 ? late_m + ' น.' : '—') + '</td>' +
      '<td style="padding:7px 4px;font-size:.78rem;color:' + (ot_h > 0 ? '#4338ca' : 'var(--t4)') + '">' + (ot_h > 0 ? ot_h.toFixed(1) + ' ชม.' : '—') + '</td>' +
    '</tr>';
  }).join('');

  return '<div style="display:flex;gap:6px;margin-bottom:10px">' +
    statBox(present,          'วันมา',    '#059669') +
    statBox(absent,           'วันขาด',   absent > 0 ? '#dc2626' : 'var(--t4)') +
    statBox(late,             'ครั้งสาย', late   > 0 ? '#d97706' : 'var(--t4)') +
    statBox(otH.toFixed(1),   'ชม. OT',  '#4338ca') +
  '</div>' +
  '<div style="overflow-x:auto">' +
  '<table style="width:100%;border-collapse:collapse;min-width:320px">' +
    '<thead><tr style="background:var(--bg-input)">' +
      '<th style="padding:6px 8px;font-size:.72rem;color:var(--t3);text-align:left;font-weight:600">วันที่</th>' +
      '<th style="padding:6px 4px;font-size:.72rem;color:var(--t3);text-align:left;font-weight:600">เข้างาน</th>' +
      '<th style="padding:6px 4px;font-size:.72rem;color:var(--t3);text-align:left;font-weight:600">ออกงาน</th>' +
      '<th style="padding:6px 4px;font-size:.72rem;color:var(--t3);text-align:left;font-weight:600">สถานะ</th>' +
      '<th style="padding:6px 4px;font-size:.72rem;color:var(--t3);text-align:left;font-weight:600">สาย</th>' +
      '<th style="padding:6px 4px;font-size:.72rem;color:var(--t3);text-align:left;font-weight:600">OT</th>' +
    '</tr></thead>' +
    '<tbody>' + dayRows + '</tbody>' +
  '</table></div>';
}


</script>

</body>
